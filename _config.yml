theme: minima
title: 🦶TOESNAIL-MODE🐌
description: &description

# Leave math delimiters ($ … $, $$ … $$) untouched in the rendered HTML so
# MathJax 3 (loaded in _includes/custom-head.html) can scan and typeset them.
# Without this, kramdown emits MathJax-2-style <script type="math/tex"> tags
# that MathJax 3 does not process. Established by the 2026-06-15 verify pilot.
kramdown:
  math_engine: null

# Every page declared a title + permalink but no `layout`, so Jekyll emitted bare
# content fragments — no <head>, hence MathJax never loaded and no math rendered.
# Apply minima's `page` layout site-wide (a page may still override in its own
# front matter). Discovered via local `bundle exec jekyll build` + tests/.
defaults:
  - scope:
      path: ""
    values:
      layout: page
