<script>
// MathJax 3 configuration. Must be defined BEFORE the library script loads.
// Established by the Resogram verify-marker pilot (2026-06-15) as the repo's
// first real equation-handle mechanism — see CONVENTIONS.md §1 and
// docs/meeting-notes/2026-06-15-1409-resogram-verify-pilot-scope.md (D5).
// \ltag{id} is the equation-handle macro: tags the display equation with `id`
// AND registers a \label so the built-in AMS \eqref{id} gives a clickable ref.
// MathJax rejects in-document \gdef (it errors on the # parameter char), so the
// macro lives here; the KaTeX-based VS Code preview gets the same macros from
// .vscode/settings.json (markdown.math.macros). See CONVENTIONS.md §1.
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
    tags: 'ams',
    macros: {
      ltag: ['\\tag{#1}\\label{#1}', 1],
      // \veq{h}\tier — numbered display tag carrying the handle AND the verification
      //   badge together in the (tag) at the right margin, e.g. \veq{edot}\lean -> (edot ✓).
      //   The 2nd arg is a tier macro; it is a single token so NO braces are needed
      //   (\veq{edot}\lean == \veq{edot}{\lean}). \label/\eqref key on the clean handle #1.
      //   The badge is $...$-wrapped inside the tag (text mode) so the math glyph renders
      //   in BOTH MathJax and KaTeX. (\ltag stays for not-yet-migrated handles; a9d2 id:dce9.)
      //   Tier macros (verification state — see CONVENTIONS.md §2):
      //     \sorry → ?   \sympy → ∘   \numeric → △   \lean → ✓   \sympylean → ✓✓
      // \veqs{h}\tier (id:a138) — unnumbered sub-step / inline-math variant: \label only,
      //   badge shown in parens inline, NO \tag (id:9c41 owner render directive 2026-06-18 —
      //   no bare label/handle shown, tier badge parenthesized). Use for sub-steps inside a
      //   derivation, inline math, or inside an aligned env that already carries an outer \tag.
      //   NB: a \veq* STAR variant via \@ifstar is INFEASIBLE — MathJax's \@ifstar registers a
      //   spurious \label keyed on the branch-macro name, so the 2nd non-star \veq in the SAME
      //   document (a whole page is one MathJax doc) fails "Label '\veqNum' multiply defined".
      //   So both forms are DIRECT macros (no \@ifstar), and the unnumbered one is a distinct
      //   name \veqs (not \veq*). The Resogram edot block uses \veqs for its sub-steps + a
      //   manual \tag{edot} for the number (a9d2). See id:a138.
      veq:     ['\\tag{#1\\,$#2$}\\label{#1}', 2],
      veqs:    ['\\label{#1}(#2)', 2],
      // Verification-tier badge macros (LaTeX symbols — no raw emoji to avoid metric warnings).
      // Plain (un-$-wrapped) here; \veq wraps the badge in $...$ when it places it in the tag.
      // Colour (ROADMAP id:c7d6, RUN half of the b7e5 author-then-run split; owner-picked
      // Option C, REVIEW_ME 2026-07-11 — assurance-ramp + amber accent, see
      // docs/palette-preview/README.md): colour is REINFORCEMENT only, the glyph stays the
      // primary channel (WCAG 1.4.1). Hardcoded \textcolor per macro (not a CSS \htmlClass
      // route) per the README's "trust may be unavailable" fallback — \textcolor needs no
      // `trust` config in either engine. Hexes below OMIT the leading '#' (both engines accept
      // a bare 6-digit hex) — KaTeX's macro-arity scanner misparses a leading "#1" as an
      // argument placeholder and corrupts the render (see tests/test_mathjax.cjs for detail);
      // never re-add the '#' to a macro string. `sympyleanc` inserts a SPACE between its two
      // opening braces (`{ {\checkmark…`) — this file is rendered through Jekyll's Liquid
      // engine before it ever reaches MathJax, and an un-spaced `{{` reads as a Liquid
      // `{{ variable }}` tag, breaking the site build (test_render.sh catches this).
      sorry:    '\\textcolor{6b7280}{\\mathbf{?}}',
      sympy:    '\\textcolor{2563eb}{\\circ}',
      numeric:  '\\textcolor{b45309}{\\triangle}',
      lean:     '\\textcolor{15803d}{\\checkmark}',
      sympylean: '\\textcolor{14532d}{\\checkmark\\!\\checkmark}',
      // Open-debt-naming-the-DESIRED-tier badges (id:feb8 RESOLVED — the `\tier*` orphan bug is
      // dodged by a letter-suffixed control word `\<tier>c`, c=claim/pending). The achieved tier
      // glyph carries a superscript `?` = "this verifier is intended but NOT yet run". On green,
      // swap `\sympyc` → `\sympy` and pin the attestation in the <stem>.toml sidecar.
      // Colour reuses the SAME hue as the discharged tier (Option C sub-decision 1) — only the
      // superscript `?` glyph distinguishes open-debt from discharged (not a separate colour).
      sympyc:    '\\textcolor{2563eb}{\\circ^{?}}',
      numericc:  '\\textcolor{b45309}{\\triangle^{?}}',
      leanc:     '\\textcolor{15803d}{\\checkmark^{?}}',
      sympyleanc: '\\textcolor{14532d}{ {\\checkmark\\!\\checkmark}^{?}}',
      // Annotation-KIND macros (not verification tiers): PILOT of the open annotation family
      // (id:8ddc / .mw id:358f open-enum {@<kind>}). \definition = a defining equation (:=),
      // \assumption = a premise/given. Full kind taxonomy is a later /meeting; these two are
      // piloted now on Resogram (e := energy def; eom = the model premise).
      definition: '\\mathrm{def}',
      assumption: '\\mathrm{ass}'
    }
  }
};
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
