<script>
// MathJax 3 configuration. Must be defined BEFORE the library script loads.
// Established by the Resogram verify-marker pilot (2026-06-15) as the repo's
// first real equation-handle mechanism — see CONVENTIONS.md §1 and
// docs/meeting-notes/2026-06-15-1409-resogram-verify-pilot-scope.md (D5).
// \ltag{id} is the equation-handle macro: tags the display equation with `id`
// AND registers a \label so the built-in AMS \eqref{id} gives a clickable ref.
// MathJax rejects in-document \gdef (it errors on the # parameter char), so the
// macro lives here; the KaTeX-based VS Code preview gets the same macros from
// .vscode/settings.json (markdown.math.macros). See CONVENTIONS.md §1.
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    processEscapes: true,
    tags: 'ams',
    macros: {
      ltag: ['\\tag{#1}\\label{#1}', 1],
      // \veq{h}\tier — numbered display tag carrying the handle AND the verification
      //   badge together in the (tag) at the right margin, e.g. \veq{edot}\lean -> (edot ✓).
      //   The 2nd arg is a tier macro; it is a single token so NO braces are needed
      //   (\veq{edot}\lean == \veq{edot}{\lean}). \label/\eqref key on the clean handle #1.
      //   The badge is $...$-wrapped inside the tag (text mode) so the math glyph renders
      //   in BOTH MathJax and KaTeX. (\ltag stays for not-yet-migrated handles; a9d2 id:dce9.)
      //   Tier macros (verification state — see CONVENTIONS.md §2):
      //     \sorry → ?   \sympy → ∘   \numeric → △   \lean → ✓   \sympylean → ✓✓
      // \veq* (id:a138) — unnumbered sub-step / inline-math variant: \quad badge, NO \tag.
      //   Use for sub-steps inside a derivation, inline math, or inside an aligned env
      //   that already carries its own outer \veq tag. Dispatch via \@ifstar.
      //   \veqNum = numbered form (= old \veq behaviour): \tag + \label.
      //   \veqStar = unnumbered form: \label only (no \tag; badge \quad-ed inline).
      //   RESIDUAL (MathJax @ifstar label-pollution quirk): when \veq* and \veq BOTH appear
      //   in the SAME convert() call (e.g. \veq* inside an aligned env AND \veq{h}\tier on
      //   the outer $$-block), MathJax's \@ifstar registers a spurious \label using the
      //   non-star branch macro name (\veqNum), causing "Label '\veqNum' multiply defined".
      //   Workaround: place \veq* usage and outer \veq{h}\tier in SEPARATE $$-blocks.
      //   See id:a138. (Display-only + inline-only \veq* work cleanly.)
      // TODO id:feb8 — \tier* open-debt notation (e.g. \sympy* = wants-sympy-but-unverified):
      //   the trailing `*` orphans with the single-token 2nd arg; needs a distinct mechanism.
      veq:     ['\\@ifstar\\veqStar\\veqNum', 0],
      veqNum:  ['\\tag{#1\\,$#2$}\\label{#1}', 2],
      veqStar: ['\\label{#1}\\quad #2', 2],
      // Verification-tier badge macros (LaTeX symbols — no raw emoji to avoid metric warnings).
      // Plain (un-$-wrapped) here; \veq wraps the badge in $...$ when it places it in the tag.
      sorry:    '\\mathbf{?}',
      sympy:    '\\circ',
      numeric:  '\\triangle',
      lean:     '\\checkmark',
      sympylean: '\\checkmark\\!\\checkmark'
    }
  }
};
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
